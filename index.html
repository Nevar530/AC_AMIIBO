<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Crossing Amiibo Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="filterPanel" class="sidebar">
<div class="sidebar-header">
   <h1>Amiibo Tracker</h1>
  <p>Track owned cards, filter the set, and preview card art.</p>
</div>

      <div class="filter-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="text" placeholder="Name, ID, species..." />
      </div>

      <div class="filter-group">
        <label for="ownedFilter">Owned</label>
        <select id="ownedFilter">
          <option value="all">All</option>
          <option value="owned">Owned only</option>
          <option value="missing">Missing only</option>
        </select>
      </div>

      <div class="filter-grid">
        <div class="filter-group">
          <label for="seriesFilter">Series</label>
          <select id="seriesFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="speciesFilter">Species</label>
          <select id="speciesFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="genderFilter">Gender</label>
          <select id="genderFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="personalityFilter">Personality</label>
          <select id="personalityFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="hobbyFilter">Hobby</label>
          <select id="hobbyFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="monthFilter">Month</label>
          <select id="monthFilter">
            <option value="">All</option>
          </select>
        </div>
      </div>

      <div class="filter-actions">
        <button id="clearFiltersBtn" class="secondary-btn" type="button">Clear Filters</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <button id="toggleFiltersBtn" class="menu-btn" type="button">☰ Filters</button>

        <div class="topbar-stats">
          <div class="stat-pill">
            <span class="stat-label">Showing</span>
            <span id="showingCount" class="stat-value">0</span>
          </div>
          <div class="stat-pill">
            <span class="stat-label">Owned</span>
            <span id="ownedCount" class="stat-value">0</span>
          </div>
          <div class="stat-pill">
            <span class="stat-label">Total</span>
            <span id="totalCount" class="stat-value">0</span>
          </div>
        </div>
      </div>

      <section class="table-wrap">
        <table class="cards-table">
          <thead>
            <tr>
              <th>Owned</th>
              <th>ID</th>
              <th>Series</th>
              <th>No.</th>
              <th>Name</th>
              <th>Species</th>
              <th>Gender</th>
              <th>Personality</th>
              <th>Hobby</th>
              <th>Birthday</th>
              <th>Month</th>
              <th>Day</th>
              <th>Show Card</th>
            </tr>
          </thead>
          <tbody id="cardsTableBody">
            <tr>
              <td colspan="13" class="loading-row">Loading cards...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="cardModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-panel">
      <button id="closeModalBtn" class="modal-close" type="button" aria-label="Close">×</button>
      <div class="modal-content">
        <div class="modal-image-wrap">
          <img id="modalImage" src="" alt="" />
        </div>
        <div class="modal-details">
          <h2 id="modalTitle">Card</h2>
          <div id="modalMeta" class="modal-meta"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
